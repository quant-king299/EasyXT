# ============================================================
# 简单小市值策略配置
# ============================================================
# 策略说明：
#   从中小板综指中选择市值最小的10只股票
#   每月第一个交易日调仓
#   等权重配置
# ============================================================

# 策略基本信息
strategy:
  name: "简单小市值策略"
  version: "1.0.0"
  author: "Your Name"
  description: "选择市值最小的10只股票，适合研究小市值效应"

# ============================================================
# 回测参数配置
# ============================================================
backtest:
  start_date: "20240102"       # 回测开始日期 (YYYYMMDD) - 数据从2024-01-02开始
  end_date: "20241231"         # 回测结束日期 (YYYYMMDD)
  initial_cash: 1000000        # 初始资金 (100万)
  commission: 0.001            # 佣金率 (0.1%)
  slippage: 0.001              # 滑点 (0.1%)

# ============================================================
# 股票池配置
# ============================================================
universe:
  type: "index"                # 股票池类型: index(指数成分股) 或 custom(自定义)
  index_code: "399101.SZ"      # 指数代码: 中小板综指
  # 如果使用自定义股票池:
  # type: "custom"
  # codes: ["000001.SZ", "000002.SZ", "600000.SH", ...]

# ============================================================
# 排除条件配置 (过滤器)
# ============================================================
exclude_filters:
  # 过滤器1: 排除ST股票
  - name: "排除ST股票"
    type: "stock_status"       # 类型: stock_status(股票状态)
    condition: "not_in"        # 条件: not_in(不在列表中)
    values: ["ST", "*ST", "S*ST"]  # 排除的股票状态

  # 过滤器2: 排除退市股票
  - name: "排除退市股票"
    type: "stock_status"
    condition: "not_in"
    values: ["退市"]

  # 过滤器3: 市值范围过滤 (10亿 - 50亿)
  # 注意: circ_mv字段单位是万元，所以这里使用万元单位
  - name: "市值范围"
    type: "fundamental"        # 类型: fundamental(基本面)
    field: "market_cap"        # 字段: market_cap(市值)
    condition: "between"       # 条件: between(在范围内)
    min_value: 100000          # 最小值: 10亿万元 = 10亿元
    max_value: 500000          # 最大值: 50亿万元 = 50亿元

  # 过滤器4: PE过滤 (可选)
  # - name: "PE过滤"
  #   type: "fundamental"
  #   field: "pe_ratio"        # PE市盈率
  #   condition: "less_than"
  #   max_value: 50            # PE < 50

# ============================================================
# 打分因子配置
# ============================================================
scoring_factors:
  # 因子1: 市值因子 (负相关 - 市值越小越好)
  - name: "市值因子"
    factor_type: "fundamental" # 因子类型: fundamental(基本面因子)
    field: "market_cap"        # 因子字段: market_cap(市值)
    direction: -1              # 方向: -1表示负相关(越小越好), 1表示正相关(越大越好)
    weight: 1.0                # 权重: 100% (只有一个因子时权重为1.0)
    normalize: true            # 标准化: true表示对因子值进行Z-score标准化
    neutralize:                # 中性化配置
      enabled: false           # 是否启用中性化

# ============================================================
# 组合构建配置
# ============================================================
portfolio:
  # 选股方式
  select_method: "top_n"       # 选股方式: top_n(选择得分最高的N只)
  top_n: 10                    # 选择10只股票

  # 权重分配方式
  weight_method: "equal"       # 权重方式: equal(等权重)

  # 风险控制 (可选)
  risk_control:
    max_position_count: 20     # 最大持仓数
    max_single_weight: 0.2     # 单只股票最大权重20%
    min_single_weight: 0.05    # 单只股票最小权重5%

# ============================================================
# 调仓配置
# ============================================================
rebalance:
  frequency: "monthly"         # 调仓频率: monthly(每月)
  rebalance_day: 1             # 每月第1个交易日调仓
  trade_time: "open"           # 交易时间: open(开盘价) 或 close(收盘价)

  # 交易执行配置 (可选)
  execution:
    type: "close"              # 使用收盘价交易
    max_trade_ratio: 0.2       # 单日最大交易比例20%

# ============================================================
# 实盘交易配置 (可选)
# ============================================================
# 如果需要生成实盘交易代码，取消以下注释并配置
# live_trading:
#   enabled: true              # 启用实盘交易
#   account_id: "your_account" # QMT账户ID
#
#   execution:
#     order_type: "limit"      # 订单类型: limit(限价单) 或 market(市价单)
#     price_offset: 0.001      # 限价单价格偏移
#
#   risk_control:
#     max_drawdown: 0.15       # 最大回撤15%止损
#     max_loss_per_trade: 0.02 # 单笔最大亏损2%
#
#   notification:
#     enabled: true
#     on_trade: true           # 交易时通知
#     on_rebalance: true       # 调仓时通知
#     on_risk: true            # 触及风控时通知
